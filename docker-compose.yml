services:
  mysql:
    image: mysql:8.0
    container_name: smart-lost-and-found-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smart_lost_and_found
      MYSQL_USER: smart_user
      MYSQL_PASSWORD: smart_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
