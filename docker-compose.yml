version: "3.9"

services:
  db:
    image: postgres:16
    container_name: smart-lost-and-found-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_lost_and_found
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
