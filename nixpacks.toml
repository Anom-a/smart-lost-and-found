providers = ["php"]

[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/backend/public"
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"

[phases.setup]
nixPkgs = [
  "...",
  "php82",
  "php82Packages.composer"
]
aptPkgs = [
  "...",
  "libpq-dev",
  "libxml2-dev"
]

[phases.install]
cmds = [
  "cd backend && composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader"
]

[phases.build]
cmds = [
  "cd backend && php artisan package:discover --ansi",
  "cd backend && php artisan config:cache",
  "cd backend && php artisan route:cache"
]

[start]
cmd = "cd backend && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
